<style>
  :root {
    --coral: #00AEEF;
    --purple: #0072BC;
    --turquoise: #29C5F6;
    --yellow: #FFD23F;
    --mint: #9FE3FF;
    --peach: #FFB88C;
    --navy: #1F1A45;
    --slate: #5B5680;
    --cream: #FFF9F2;
    --white: #FFFFFF;
    --shadow-soft: 0 8px 32px rgba(0, 114, 188, 0.08);
    --shadow-pop: 0 12px 40px rgba(0, 174, 239, 0.18);
    --radius-lg: 24px;
    --radius-md: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    color: var(--navy);
    background: linear-gradient(135deg, #E3F5FF 0%, #FFF3E0 40%, #EAF8FF 100%);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 15% 20%, rgba(0, 174, 239, 0.15), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(0, 114, 188, 0.12), transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(41, 197, 246, 0.08), transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .app { max-width: 1200px; margin: 0 auto; padding: 20px 24px 80px; position: relative; z-index: 1; }

  .ico { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

  /* HEADER */
  .header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px; flex-wrap: wrap; gap: 16px;
    background: var(--navy); color: var(--white);
    border-radius: var(--radius-lg);
    padding: 20px 24px;
    box-shadow: var(--shadow-soft);
  }
  .brand-row { display: flex; align-items: center; gap: 14px; }
  .compass-mark { width: 48px; height: 48px; flex-shrink: 0; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.25)); }
  .brand h1 {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: clamp(22px, 3vw, 28px);
    letter-spacing: -0.01em;
    line-height: 1.1;
    color: var(--white);
  }
  .brand p.today-date { color: rgba(255,255,255,0.65); margin-top: 4px; font-size: 13px; font-weight: 600; text-transform: capitalize; }
  .brand p.motivational { color: rgba(255,255,255,0.75); margin-top: 4px; font-size: 13px; font-style: italic; }
  .header-actions { display: flex; align-items: center; gap: 10px; }
  .streak {
    background: rgba(255,255,255,0.12);
    padding: 12px 18px;
    border-radius: 999px;
    display: flex; align-items: center; gap: 10px;
    font-weight: 600; font-size: 13px; color: var(--white);
  }
  .streak .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--turquoise); box-shadow: 0 0 10px var(--turquoise); }

  /* HEADER: boton de candado / cambiar PIN */
  .avatar-btn {
    background: rgba(255,255,255,0.12); border: 0; cursor: pointer;
    width: 42px; height: 42px; border-radius: 50%;
    display: grid; place-items: center; font-size: 18px;
    color: var(--white); transition: all .2s; flex-shrink: 0;
  }
  .avatar-btn:hover { background: rgba(255,255,255,0.22); transform: translateY(-1px); }

  /* ===================== LOGIN GATE (PIN local) ===================== */
  .login-gate {
    position: fixed; inset: 0; z-index: 999;
    background: linear-gradient(135deg, var(--navy), #150f38);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .login-gate.hidden { display: none; }
  .app.app-hidden { display: none; }
  .login-card {
    background: var(--white);
    border-radius: var(--radius-lg);
    padding: 40px 32px 32px;
    max-width: 360px; width: 100%;
    text-align: center;
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
    animation: pop .35s ease;
  }
  .login-card .compass-mark { width: 64px; height: 64px; margin: 0 auto 18px; }
  .login-card h2 {
    font-family: 'Fraunces', serif; font-weight: 700; font-size: 24px;
    color: var(--navy); margin-bottom: 6px; letter-spacing: -0.01em;
  }
  .login-card .login-subtitle { color: var(--slate); font-size: 13px; margin-bottom: 24px; line-height: 1.5; }
  .login-card .input {
    width: 100%; text-align: center; letter-spacing: 10px;
    font-size: 22px; font-weight: 700; margin-bottom: 6px;
  }
  .login-card .btn { width: 100%; justify-content: center; margin-top: 10px; }
  .login-error {
    color: #C82346; font-size: 13px; font-weight: 600;
    min-height: 18px; margin: 6px 0 0;
  }
  .login-note { color: var(--slate); font-size: 11px; margin-top: 18px; }

  /* TABS */
  .tabs {
    display: flex; gap: 6px; padding: 6px;
    background: var(--white);
    border-radius: 999px;
    box-shadow: var(--shadow-soft);
    margin-bottom: 28px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 1; min-width: fit-content;
    background: transparent; border: 0; cursor: pointer;
    padding: 12px 18px; border-radius: 999px;
    font-family: inherit; font-size: 14px; font-weight: 600; color: var(--slate);
    transition: all .25s ease;
    white-space: nowrap;
    display: flex; align-items: center; justify-content: center; gap: 7px;
  }
  .tab .ico { width: 16px; height: 16px; }
  .tab:hover { color: var(--navy); }
  .tab.active {
    color: var(--white);
    background: linear-gradient(135deg, var(--coral), var(--purple));
    box-shadow: 0 6px 20px rgba(0, 114, 188, 0.3);
  }

  /* PANELS */
  .panel { display: none; animation: fadeUp .4s ease; }
  .panel.active { display: block; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* CARDS */
  .card {
    background: var(--white);
    border-radius: var(--radius-lg);
    padding: 28px;
    box-shadow: var(--shadow-soft);
    margin-bottom: 20px;
  }
  .card h2 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 22px;
    margin-bottom: 6px;
    letter-spacing: -0.01em;
    display: flex; align-items: center; gap: 10px;
  }
  .card h2 .ico { width: 20px; height: 20px; color: var(--purple); }
  .card .subtitle { color: var(--slate); font-size: 14px; margin-bottom: 20px; }

  /* INPUT ROW */
  .input-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .input, .select {
    font-family: inherit; font-size: 14px;
    padding: 14px 18px;
    border: 2px solid #F0EDF7;
    border-radius: var(--radius-md);
    background: #FAFAFF;
    color: var(--navy);
    transition: all .2s;
    flex: 1; min-width: 140px;
  }
  .input:focus, .select:focus { outline: none; border-color: var(--purple); background: var(--white); }
  .btn {
    font-family: inherit; font-weight: 600; font-size: 14px;
    padding: 14px 24px; border: 0; cursor: pointer;
    border-radius: var(--radius-md);
    background: linear-gradient(135deg, var(--coral), var(--purple));
    color: var(--white);
    box-shadow: var(--shadow-pop);
    transition: transform .15s, box-shadow .15s;
    white-space: nowrap;
    display: inline-flex; align-items: center; gap: 8px; justify-content: center;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 16px 44px rgba(0, 174, 239, 0.25); }
  .btn:active { transform: translateY(0); }
  .btn.secondary {
    background: #F0EDF7; color: var(--navy); box-shadow: none;
  }
  .btn.secondary:hover { background: #E4DFF2; box-shadow: none; }
  .btn.ghost {
    background: transparent; color: var(--slate); box-shadow: none;
    padding: 8px 14px; font-size: 13px;
  }

  /* CATEGORY CHIPS */
  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .chip {
    padding: 8px 14px; border-radius: 999px;
    background: #F5F1FA; border: 2px solid transparent;
    font-size: 13px; font-weight: 600; color: var(--slate);
    cursor: pointer; transition: all .2s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .chip:hover { background: #EAE3F5; }
  .chip.active { background: var(--white); border-color: var(--purple); color: var(--navy); }

  /* TASK / EXPENSE / PAYMENT ITEM */
  .item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px;
    border-radius: var(--radius-md);
    background: #FAFAFF;
    margin-bottom: 8px;
    transition: all .2s;
    border: 2px solid transparent;
  }
  .item:hover { background: var(--white); border-color: #F0EDF7; }
  .item.done { opacity: 0.55; }
  .item.done .item-title { text-decoration: line-through; }

  .checkbox {
    width: 26px; height: 26px; border-radius: 8px;
    border: 2px solid #D8D2E8; background: var(--white);
    cursor: pointer; flex-shrink: 0;
    display: grid; place-items: center;
    transition: all .2s;
  }
  .checkbox:hover { border-color: var(--purple); }
  .checkbox.checked {
    background: linear-gradient(135deg, var(--turquoise), var(--mint));
    border-color: transparent;
  }
  .checkbox.checked::after {
    content: '✓'; color: var(--white); font-weight: 800; font-size: 15px;
  }

  .item-body { flex: 1; min-width: 0; }
  .item-title { font-weight: 600; font-size: 15px; word-break: break-word; }
  .item-meta { font-size: 12px; color: var(--slate); margin-top: 3px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
  }
  .tag-priority { background: #FFE8E8; color: #E63946; }

  .star-btn, .del-btn {
    background: transparent; border: 0; cursor: pointer;
    color: var(--slate); padding: 6px; border-radius: 8px;
    transition: all .2s; font-size: 16px;
  }
  .star-btn:hover { color: var(--yellow); background: #FFF9E0; }
  .star-btn.active { color: var(--yellow); }
  .del-btn:hover { color: var(--coral); background: #FFECF3; }

  .amount { font-weight: 700; font-family: 'Fraunces', serif; font-size: 16px; color: var(--navy); }

  /* PROGRESS */
  .progress-wrap {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 20px;
    background: linear-gradient(135deg, #FFF3E0, #E3F5FF);
    border-radius: var(--radius-md);
    margin-bottom: 20px;
  }
  .progress-emoji { font-size: 28px; }
  .progress-info { flex: 1; }
  .progress-text { font-size: 13px; color: var(--slate); margin-bottom: 6px; }
  .progress-text b { color: var(--navy); font-weight: 700; }
  .progress-bar {
    height: 8px; background: rgba(255, 255, 255, 0.7); border-radius: 999px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--coral), var(--purple), var(--turquoise));
    border-radius: 999px;
    transition: width .5s ease;
  }

  /* METRICS GRID */
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; }
  .metric {
    padding: 22px;
    border-radius: var(--radius-lg);
    color: var(--white);
    position: relative;
    overflow: hidden;
  }
  .metric::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 100% 0%, rgba(255,255,255,0.25), transparent 60%);
  }
  .metric.pink { background: linear-gradient(135deg, #00AEEF, #5AC8FA); }
  .metric.purple { background: linear-gradient(135deg, #0072BC, #3D8BC4); }
  .metric.teal { background: linear-gradient(135deg, #29C5F6, #9FE3FF); }
  .metric.orange { background: linear-gradient(135deg, #FFB88C, #FFD23F); color: var(--navy); }
  .metric-label { font-size: 12px; font-weight: 600; opacity: 0.9; text-transform: uppercase; letter-spacing: 0.05em; }
  .metric-value { font-family: 'Fraunces', serif; font-size: 32px; font-weight: 700; margin-top: 6px; letter-spacing: -0.02em; }
  .metric-hint { font-size: 12px; opacity: 0.85; margin-top: 4px; }

  /* GRID FOR CHARTS */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 800px) { .grid-2 { grid-template-columns: 1fr; } }

  .chart-wrap { position: relative; height: 280px; }

  /* PAYMENT CATEGORIES */
  .cat-group { margin-bottom: 24px; }
  .cat-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; margin-bottom: 8px;
    border-radius: var(--r
